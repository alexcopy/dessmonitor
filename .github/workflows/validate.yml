name: Validate

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️  Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Python syntax validation
        run: python -m compileall -q . -x '/(ml_data|\.project-memory|\.git|venv|\.venv)/'

      - name: 🔍 YAML syntax validation
        run: python scripts/validate-yaml.py

      - name: 🔍 Repository safety check
        run: bash scripts/check-repo-safety.sh

      - name: 🔍 Project-memory structure check
        run: bash scripts/check-project-memory.sh

      - name: 🔍 Runtime smoke validation
        run: python scripts/check-runtime-smoke.py

      - name: 🔍 Image publishing boundary check
        run: bash scripts/check-image-publishing-boundary.sh

      - name: 🔍 Platform control redesign check
        run: bash scripts/check-platform-control-redesign.sh

      - name: 🔍 Pump automation disabled check
        run: bash scripts/check-pump-automation-disabled.sh

      - name: 🔍 Generic control domain check
        run: bash scripts/check-generic-control-domain.sh

      - name: 🔍 Relay-to-SwitchableLoad mapping check
        run: bash scripts/check-relay-switchable-load-mapping.sh

      - name: 🔍 Energy-aware control policy check
        run: bash scripts/check-energy-aware-control-policy.sh

      - name: 🔍 Energy policy domain types check
        run: bash scripts/check-energy-policy-domain-types.sh

      - name: 🔍 Energy policy config example check
        run: bash scripts/check-energy-policy-config-example.sh

      - name: 🔍 Readiness evaluator check
        run: bash scripts/check-readiness-evaluator.sh

      - name: 🔍 Health evaluator check
        run: bash scripts/check-health-evaluator.sh

      - name: 🔍 Schedule profile model check
        run: bash scripts/check-schedule-profile-model.sh

      - name: 🔍 Weather adjustment evaluator check
        run: bash scripts/check-weather-adjustment-evaluator.sh

      - name: 🔍 Policy engine operating boundaries check
        run: bash scripts/check-policy-engine-operating-boundaries.sh

      - name: 🔍 Policy engine models check
        run: bash scripts/check-policy-engine-models.sh

      - name: 🔍 Policy decision engine check
        run: bash scripts/check-policy-decision-engine.sh

      - name: 🔍 Policy decision scenarios check
        run: bash scripts/check-policy-decision-scenarios.sh

      - name: 🔍 Manual control queue check
        run: bash scripts/check-manual-control-queue.sh

      - name: 🔍 Command arbitration check
        run: bash scripts/check-command-arbitration.sh

      - name: 🔍 Command safety gate check
        run: bash scripts/check-command-safety-gate.sh

      - name: 🔍 Execution eligibility check
        run: bash scripts/check-execution-eligibility.sh

      - name: 🔍 Control state snapshot check
        run: bash scripts/check-control-state-snapshot.sh

      - name: 🔍 Runtime snapshot adapter check
        run: bash scripts/check-runtime-snapshot-adapter.sh

      - name: 🔍 Web UI read-only API contract check
        run: bash scripts/check-web-ui-read-only-api-contract.sh

      - name: 🔍 Web UI read-only endpoint plan check
        run: bash scripts/check-web-ui-read-only-endpoint-plan.sh

      - name: 🔍 Web UI read-only endpoint check
        run: bash scripts/check-web-ui-read-only-endpoint.sh

      - name: 🔍 Web host bootstrap check
        run: bash scripts/check-web-host-bootstrap.sh

      - name: 🔍 Web control state provider check
        run: bash scripts/check-web-control-state-provider.sh

      - name: 🔍 Web host startup check
        run: bash scripts/check-web-host-startup.sh

      - name: 🔍 Runtime read-only web host check
        run: bash scripts/check-runtime-read-only-web-host.sh

      - name: 🔍 Web authentication check
        run: bash scripts/check-web-authentication.sh
