    result: pass
    notes: "grep -q 'ML control' PLAN.md -> PASS. Section 15: 'ML control remains disabled per ADR-0003.'"
  - name: No decision engine implementation in 0018A
    result: pass
    notes: "Section 2: 'This PR does NOT implement the decision engine.' Section 5: 0018A is 'documentation and validation of product invariants... No code.'"
  - name: No runtime wiring
    result: pass
    notes: "Section 15: 'No runtime wiring: Not connected to any runtime component.' Section 6.17: 'The engine must never call hardware switch methods...'"
  - name: No hardware execution
    result: pass
    notes: "Section 6.17: 'The engine must never call hardware switch methods... call Tuya, DESS, OpenWeather... switch devices.'"
  - name: No command proposal implementation in 0018A
    result: pass
    notes: "Section 6.19: Command proposal deferred to 0020. 0018A is documentation only."
  - name: No automation or ML control enabled
    result: pass
    notes: "Section 15: 'No automation enabled... No ML control enabled: ML advisory is advice-only.'"
  - name: Morning minimum strategy documented
    result: pass
    notes: "Section 6.5: 'Overcast morning with sunny forecast in 2 hours: preserve battery near morning minimum.' 'Cloudy morning with bad all-day forecast: conserve energy more aggressively.'"
  - name: Forecast-aware morning strategy
    result: pass
    notes: "Section 6.13: 'The engine must consider forecast when making morning decisions: Sunny forecast in 2 hours → preserve battery near morning minimum. Bad all-day forecast → conserve energy aggressively.'"
  - name: Bad all-day forecast strategy
    result: pass
    notes: "Section 6.5: 'Cloudy morning with bad all-day forecast: conserve energy more aggressively; minimize discretionary load activation; protect evening reserve from morning draw-down.'"
  - name: Weather unknown safe strategy
    result: pass
    notes: "Section 6.14: 'When weather forecast is missing, stale, or UNKNOWN, the engine must fall back to conservative defaults (no adjustment factor = 1.0, no assumed sunny spending).'"
  - name: Scenario matrix with at least 12 scenarios
    result: pass
    notes: "Section 6.18 describes 12 scenarios: (1) cloudy morning/sunny later, (2) cloudy morning/bad all-day, (3) sunny/battery rising, (4) sunny/near capacity, (5) battery near fallback, (6) evening reserve, (7) weather unknown, (8) pond 26°C/bad weather, (9) pond 26°C/near cap, (10) aeration unhealthy, (11) multiple aerators, (12) high PV/aeration vs low-priority."
  - name: Inverter max load protection
    result: pass
    notes: "Section 6.9: 'max_total_load_watts: Configurable, typical 2500W. The engine must never propose or suggest a total active load exceeding this limit.'"
  - name: Load priority and wattage awareness
    result: pass
    notes: "Section 6.10: 'Shedding order: LOW priority discretionary first, then NORMAL, then HIGH. CRITICAL loads must never be automatically switched OFF unless safety conditions require it.'"
  - name: Pond/fish aeration life-support invariant
    result: pass
    notes: "Section 6.11: 'Pond aeration is life-support, not ordinary discretionary load. Aeration devices maintain dissolved oxygen for fish and biological filtration. The engine must treat pond aeration as a protected class above standard discretionary loads.'"
  - name: High pond temperature 25-26°C rule
    result: pass
    notes: "Section 6.12: 'When pond water temperature equals or exceeds pond_hot_water_temperature_c (25-26°C), aeration becomes safety-critical because warm water holds less dissolved oxygen.'"
  - name: Shed discretionary before aeration
    result: pass
    notes: "Section 6.12: 'If load cap is tight, shed lower-priority discretionary loads before pond aeration.' Section 8: 'Shed lower-priority discretionary loads before life-support aeration.'"
  - name: 0020+ command proposal before execution
    result: pass
    notes: "Section 6.19: '0020: Command proposal before automatic execution. Later: Controlled execution with safety gates.' Consistent with roadmap."
  - name: Additive validate.yml step only
    result: pass
    notes: "Section 11: adds one step after existing weather adjustment evaluator check. Does not modify existing steps."
  - name: Concise CURRENT_STATE.md update
    result: pass
    notes: "Section 12 defines exact wording: 'PR 0018A records policy engine operating boundaries... No decision engine implementation yet. No runtime wiring. No execution. No automation.' No broad rewrite."
  - name: Concise ROADMAP.md update
    result: pass
    notes: "Section 13 replaces single PR 0018 line with 0018A/0018B/0018C/0018D split. No broad rewrite of unrelated sections."
  - name: Allowed implementation files match specification
    result: pass
    notes: "Section 9: .project-memory/POLICY_DECISION_ENGINE.md (create), scripts/check-policy-engine-operating-boundaries.sh (create), .github/workflows/validate.yml (edit), CURRENT_STATE.md (edit), ROADMAP.md (edit), CODER_REPORT.txt (create)."
  - name: Forbidden implementation files
    result: pass
    notes: "Section 10: run.py, app/service/**, app/devices/**, app/tuya/**, app/monitoring/**, app/ml/**, app/weather/**, app/control/*.py (all frozen), examples/energy_policy.example.yaml, service/**, shared_state/**, config/data files, Docker/deployment files, build-and-deploy.yml."
  - name: Static validation script requirements defined
    result: pass
    notes: "Section 11 defines 20 requirements: check document exists, 7 battery/pond parameters, 7 numeric values, life-support/aeration/forecast/high-voltage/inverter/shedding/no-execution/0018B/0018C/0018D/no-runtime-modification checks, clear output, exit 0/1."
