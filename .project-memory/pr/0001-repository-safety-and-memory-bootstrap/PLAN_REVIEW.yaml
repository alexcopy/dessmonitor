blockers: []

warnings:
  - id: W-001
    severity: warning
    finding: The word "locked" does not appear in PLAN.md. Validation checklist item 9 (grep -q "locked") fails. The plan uses "approved" to describe the sequential agent gating mechanism (Section 4: "No agent may proceed unless the previous artifact is approved") which achieves the same practical protection, but the specific word "locked" is absent from the document.
    recommendation: The sequential approval gate (plan → plan-review → coder → precommit-review) functionally prevents alteration of locked artifacts. However, for full spec compliance, consider adding explicit language such as "PLAN.md and PLAN_REVIEW.yaml must be committed and locked before coder starts" in Section 4 or as a standalone governance rule.

  - id: W-002
    severity: warning
    finding: PLAN.md does not contain an explicit prohibition stating that "coder and precommit-review must not edit PLAN.md or PLAN_REVIEW.yaml." The plan establishes a sequential agent workflow (Section 4) where precommit-review runs after coder, making it impractical for precommit-review to alter its own upstream input artifact. The plan also limits coder's scope to "Implementation Checklist" (Section 7) rather than planning artifacts. However, the explicit constraint is not written as a rule.
    recommendation: Add a governance rule to Section 4 or a dedicated "Agent Constraints" section: "Coder and precommit-review agents must not edit PLAN.md or PLAN_REVIEW.yaml. These files are read-only once committed at HEAD." This aligns with the SPECIFICATION item 11 requirement.

  - id: W-003
    severity: warning
    finding: PLAN.md Section 2.3 states "Current .gitignore already covers: ... devices_prod.yaml — present" but validation confirms that `devices_prod.yaml` is NOT currently present in .gitignore (the grep check fails). The plan's "Current" description in Section 2.3 does not match the observed file state. The implementation checklist (item 11: "Update .gitignore with devices_prod.yaml") correctly lists this as a required fix, so the coder will add it, but the diagnostic framing in Section 2.3 is inaccurate.
    recommendation: Section 2.3 framing should be corrected to "Gaps identified (additions only):" to accurately describe the current file state rather than claiming coverage that does not yet exist.

