    result: pass
    exact_observed_evidence: "Section 6: Full environment contract table with 7 variables (WEB_AUTH_USERNAME, WEB_AUTH_PASSWORD_HASH, WEB_AUTH_SESSION_SECRET, WEB_AUTH_SESSION_TTL_SECONDS, WEB_AUTH_MAX_ATTEMPTS, WEB_AUTH_ATTEMPT_WINDOW_SECONDS, WEB_AUTH_LOCKOUT_SECONDS). Each with Required/Validation/Default/Failure mode."
