    result: pass
    exact_observed_evidence: "Section 6: 'WEB_AUTH_SESSION_SECRET must be at least 32 bytes (64 hex characters) after stripping whitespace. Shorter values raise WebAuthConfigError(session-secret-too-short).' Test [4] covers this."
  - name: fail-closed-missing-invalid-config
    result: pass
    exact_observed_evidence: "Section 4.7: 'Missing WEB_AUTH_USERNAME → create_app() raises WebAuthConfigError(auth-not-configured). The web host startup fails; run.py catches the exception and continues the automation process without any HTTP listener. No route, including /healthz and /control/state, is exposed.'"
  - name: no-authentication-bypass
    result: pass
    exact_observed_evidence: "Section 4.7: 'No fallback leaves /control/state publicly readable.' Section 5: All routes except /healthz, /login GET, and /static/login.css are authenticated. /docs, /redoc, /openapi.json return 404."
  - name: Secure-HttpOnly-SameSite-expiring-cookie
    result: pass
    exact_observed_evidence: "Section 4.4: Secure=True, HttpOnly=True, SameSite=Lax, Max-Age=WEB_AUTH_SESSION_TTL_SECONDS (default 3600), Path=/, cookie name=dessmonitor_session. Deletion on logout via response.delete_cookie()."
  - name: session-replacement-after-login
    result: pass
    exact_observed_evidence: "Section 4.5.4: 'The token is rotated on every successful login.' Section 8 Step 4c: 'On success: ... create_session_data(); write session; rotate csrf_token.' Test [20]: 'Successful login replaces prior session (session_id or csrf_token changes).'"
  - name: tampered-expired-cookie-rejection
    result: pass
    exact_observed_evidence: "Section 4.3: 'Starlette's SessionMiddleware uses itsdangerous.URLSafeTimedSerializer with the WEB_AUTH_SESSION_SECRET as the signing key.' Tampered cookies fail signature verification. Expired cookies fail timed-serializer verification (itsdangerous)."
  - name: explicit-logout-invalidation
    result: pass
    exact_observed_evidence: "Section 5: 'POST /logout: Auth + CSRF. Clears session, deletes cookie, redirect 303 to /login.' Test [29]: 'POST /logout (authenticated) → redirect to /login.' Test [30]: 'Old session cookie after logout → cannot access /control/state (401 or redirect).'"
  - name: CSRF-on-login
    result: pass
    exact_observed_evidence: "Section 4.5: Synchronizer token pattern. Token in login form. Validated on POST /login. Test [21]: 'POST /login without CSRF token → 403.' Test [22]: 'POST /login with wrong CSRF token → 403.'"
  - name: CSRF-on-logout
    result: pass
    exact_observed_evidence: "Section 4.5: CSRF validated on every POST/PUT/PATCH/DELETE including logout. Test [24]: 'POST /logout without CSRF token → 403.' Test [25]: 'POST /logout with correct CSRF token → 303 redirect to /login.'"
  - name: deterministic-bounded-throttling-monotonic-time
    result: pass
    exact_observed_evidence: "Section 4.6: 'In-memory deterministic throttling using time.monotonic(). Key: (username, source_ip). Window: WEB_AUTH_ATTEMPT_WINDOW_SECONDS (default 300). Max attempts: WEB_AUTH_MAX_ATTEMPTS (default 5). Lockout: WEB_AUTH_LOCKOUT_SECONDS (default 900).' Test [31]-[34] cover throttling."
  - name: GET-login
    result: pass
    exact_observed_evidence: "Section 5: '/login GET: Public. Renders login.html. Authenticated users redirected (303) to /. Cache-Control: no-store. CSRF token form field.'"
  - name: POST-login
    result: pass
    exact_observed_evidence: "Section 5: '/login POST: Public + CSRF. Validates username (env), Argon2 hash. Generic error on any failure. Creates session on success, redirect 303 to /. Throttling applied.'"
  - name: POST-logout
    result: pass
    exact_observed_evidence: "Section 5: '/logout POST: Auth + CSRF. Clears session, deletes cookie, redirect 303 to /login.' Section 4.5: 'Logout also rotates the token (though the session is cleared immediately after).'"
