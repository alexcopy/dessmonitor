  - name: grep_validation_all_pass
    result: pass
    notes: "All 18 required grep validation checks passed: PowerSource, VoltageSnapshot, WeatherForecastSignal, BatteryReservePolicy, DeviceEnergyPolicy, ReadinessInput, ReadinessResult, HealthStatus, HealthCheckResult, EnergyPolicyContext, EnergyPolicyDecision, 26.5, ML advisory, ML control, external GitOps, locked, CODER_REPORT.txt, PRECOMMIT_REVIEW.yaml."
