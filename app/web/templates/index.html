<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dessmonitor — Operator</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         "Helvetica Neue", Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: #1a1a2e;
            background: #f0f2f5;
            min-height: 100vh;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .container {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
        p { color: #6b7280; font-size: 0.9375rem; margin-bottom: 1rem; }
        .btn {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #ffffff;
            background: #dc2626;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { background: #b91c1c; }
        @media (prefers-color-scheme: dark) {
            html { color: #e5e7eb; background: #111827; }
            .container { background: #1f2937; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
            h1 { color: #f9fafb; }
            p { color: #9ca3af; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>dessmonitor Operator</h1>
        <p>Authenticated as <strong>{{ username }}</strong></p>
        <form method="post" action="/logout">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="btn">Sign Out</button>
        </form>
    </div>
</body>
</html>
